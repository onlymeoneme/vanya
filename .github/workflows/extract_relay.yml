name: Extract Relay from Link

on:
  workflow_dispatch:
    inputs:
      relay_link:
        description: 'Вставьте ссылку для извлечения данных (IP:PORT и Хэш)'
        required: true
        type: string

jobs:
  run-extractor:
    runs-on: ubuntu-latest

    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Настройка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Запуск скрипта экстрактора
      run: |
        # Скрипт запишет результаты в файл relays_output.txt
        python scanner.py --link "${{ github.event.inputs.relay_link }}" -o relays_output.txt

    - name: Сохранение изменений в репозиторий
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add relays_output.txt
        git commit -m "Автоматическое обновление: извлечены данные из ссылки" || echo "Нет изменений для коммита"
        git push
